name: RDP

on:
  workflow_dispatch:

jobs:
 secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Configure Core RDP Settings
        shell: powershell
        run: |
          Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" `
            -Name "fDenyTSConnections" -Value 0

          Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" `
            -Name "UserAuthentication" -Value 0

          Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" `
            -Name "SecurityLayer" -Value 0

          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

          Restart-Service TermService -Force

      - name: Create RDP User
        shell: powershell
        run: |

          if (Get-LocalUser -Name "RDP" -ErrorAction SilentlyContinue) {
              Remove-LocalUser -Name "RDP"
          }

          $chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789!@#$%^&*'
          $password = -join (1..20 | ForEach-Object { $chars[(Get-Random -Maximum $chars.Length)] })

          $secure = ConvertTo-SecureString $password -AsPlainText -Force

          New-LocalUser `
            -Name "RDP" `
            -Password $secure `
            -AccountNeverExpires

          Add-LocalGroupMember -Group Administrators -Member RDP
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member RDP

          echo "RDP_USER=RDP" >> $env:GITHUB_ENV
          echo "RDP_PASSWORD=$password" >> $env:GITHUB_ENV

      - name: Install Tailscale
        shell: powershell
        run: |

          $url = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"

          $installer = Join-Path $env:TEMP "tailscale.msi"

          Write-Host "Downloading Tailscale..."

          Invoke-WebRequest `
            -Uri $url `
            -OutFile $installer

          Write-Host "Installing..."

          Start-Process msiexec.exe `
            -ArgumentList "/i `"$installer`" /quiet /norestart" `
            -Wait

          Remove-Item $installer -Force

          $exe = "C:\Program Files\Tailscale\tailscale.exe"

          if (!(Test-Path $exe)) {
              throw "Tailscale installation failed."
          }

      - name: Connect Tailscale
        shell: powershell
        run: |

          $exe = "C:\Program Files\Tailscale\tailscale.exe"

          & $exe up `
            --authkey="${{ secrets.TAILSCALE_AUTH_KEY }}" `
            --hostname="github-${{ github.run_id }}"

          $ip = $null

          for ($i=0; $i -lt 12; $i++) {

              $ip = (& $exe ip -4 | Select-Object -First 1)

              if ($ip) {
                  break
              }

              Start-Sleep 5
          }

          if (!$ip) {
              throw "No Tailscale IP received."
          }

          echo "TAILSCALE_IP=$ip" >> $env:GITHUB_ENV

      - name: Verify RDP
        shell: powershell
        run: |

          Write-Host "Checking RDP on $env:TAILSCALE_IP"

          $result = Test-NetConnection `
            -ComputerName $env:TAILSCALE_IP `
            -Port 3389

          if (!$result.TcpTestSucceeded) {
              throw "RDP port is not reachable."
          }

      - name: Show Connection Info
        shell: powershell
        run: |

          Write-Host ""
          Write-Host "================================="
          Write-Host "Address : $env:TAILSCALE_IP"
          Write-Host "User    : $env:RDP_USER"
          Write-Host "Password: $env:RDP_PASSWORD"
          Write-Host "================================="
          Write-Host ""

      - name: Keep Runner Alive
        shell: powershell
        run: |

          while ($true) {
              Write-Host "$(Get-Date) - Runner Alive"
              Start-Sleep -Seconds 300
          }
